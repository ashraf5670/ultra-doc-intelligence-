<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ultra Doc-Intelligence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2e3047;
      --accent:   #6c63ff;
      --accent2:  #00d4aa;
      --text:     #e8eaf0;
      --muted:    #8a8fa8;
      --danger:   #ff5c5c;
      --success:  #22c55e;
      --warn:     #f59e0b;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--accent2); }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(108,99,255,.05); }
    .upload-zone input { display: none; }
    .upload-zone .icon { font-size: 28px; margin-bottom: 8px; }
    .upload-zone p { color: var(--muted); font-size: 12px; }
    .upload-zone strong { color: var(--text); }

    .doc-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      font-size: 12px;
    }
    .doc-card .name { font-weight: 600; color: var(--accent2); word-break: break-all; margin-bottom: 4px; }
    .doc-card .meta { color: var(--muted); }

    /* ── Main ── */
    .main { display: flex; flex-direction: column; height: 100vh; }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .tab {
      padding: 14px 20px;
      cursor: pointer;
      color: var(--muted);
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all .2s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    .panel { display: none; flex: 1; overflow-y: auto; padding: 24px; }
    .panel.active { display: flex; flex-direction: column; gap: 16px; }

    /* ── Q&A Panel ── */
    .messages { flex: 1; display: flex; flex-direction: column; gap: 16px; min-height: 0; }

    .msg { display: flex; gap: 10px; }
    .msg.user { flex-direction: row-reverse; }
    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
    }
    .msg.user .bubble  { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot  .bubble  { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
      background: var(--border);
    }

    .conf-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      margin-top: 6px;
      font-weight: 600;
    }
    .conf-high   { background: rgba(34,197,94,.15);  color: var(--success); }
    .conf-mid    { background: rgba(245,158,11,.15);  color: var(--warn); }
    .conf-low    { background: rgba(255,92,92,.15);   color: var(--danger); }

    .sources-toggle {
      margin-top: 8px;
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
    }
    .sources-box {
      display: none;
      margin-top: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      color: var(--muted);
      max-height: 200px;
      overflow-y: auto;
    }
    .sources-box.open { display: block; }
    .source-chunk { border-bottom: 1px solid var(--border); padding: 6px 0; }
    .source-chunk:last-child { border: none; }

    .ask-bar {
      display: flex;
      gap: 8px;
      padding: 16px 0 0;
      border-top: 1px solid var(--border);
    }
    .ask-bar input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border .2s;
    }
    .ask-bar input:focus { border-color: var(--accent); }
    .ask-bar button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity .2s;
    }
    .ask-bar button:hover { opacity: .85; }
    .ask-bar button:disabled { opacity: .4; cursor: default; }

    /* ── Extract Panel ── */
    .extract-btn {
      background: var(--accent2);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      align-self: flex-start;
      transition: opacity .2s;
    }
    .extract-btn:hover { opacity: .85; }
    .extract-btn:disabled { opacity: .4; cursor: default; }

    .json-output {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      font-family: 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 12.5px;
      overflow-x: auto;
      white-space: pre;
    }
    .json-key   { color: #79c0ff; }
    .json-str   { color: #a5d6a7; }
    .json-null  { color: var(--muted); font-style: italic; }
    .json-num   { color: #ffab70; }

    /* ── States ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { color: var(--muted); text-align: center; padding: 40px; }

    .alert {
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
    }
    .alert.error   { background: rgba(255,92,92,.1);  border: 1px solid var(--danger); color: var(--danger); }
    .alert.success { background: rgba(34,197,94,.1);  border: 1px solid var(--success); color: var(--success); }

    @media (max-width: 640px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">Ultra <span>Doc-IQ</span></div>

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".pdf,.docx,.txt" />
      <div class="icon">📄</div>
      <p><strong>Drop a logistics doc</strong><br/>PDF, DOCX, or TXT</p>
    </div>

    <div id="docCard" style="display:none" class="doc-card">
      <div class="name" id="docName"></div>
      <div class="meta" id="docMeta"></div>
    </div>

    <div id="uploadStatus"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="tabs">
      <div class="tab active" data-tab="qa">💬 Ask Questions</div>
      <div class="tab" data-tab="extract">🗂️ Structured Extract</div>
    </div>

    <!-- Q&A -->
    <div class="panel active" id="tab-qa">
      <div class="messages" id="messages">
        <div class="empty-state">Upload a document, then ask anything about it.</div>
      </div>
      <div class="ask-bar">
        <input id="questionInput" type="text"
               placeholder="What is the carrier rate? When is pickup scheduled?" disabled />
        <button id="askBtn" disabled>Ask</button>
      </div>
    </div>

    <!-- EXTRACT -->
    <div class="panel" id="tab-extract">
      <p style="color:var(--muted)">
        Automatically extract structured shipment fields from the uploaded document.
      </p>
      <button class="extract-btn" id="extractBtn" disabled>⚡ Extract Shipment Data</button>
      <div id="extractOutput"></div>
    </div>
  </main>
</div>

<script>
  const API = '';   // same origin; change to http://localhost:8000 for separate dev
  let docId = null;

  // ── Tab switching ──────────────────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ── Upload ─────────────────────────────────────────────────────────────────
  const zone  = document.getElementById('uploadZone');
  const input = document.getElementById('fileInput');

  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag');
    if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
  });
  input.addEventListener('change', () => { if (input.files[0]) uploadFile(input.files[0]); });

  async function uploadFile(file) {
    const statusEl = document.getElementById('uploadStatus');
    statusEl.innerHTML = '<div class="spinner"></div> Parsing & indexing…';
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res  = await fetch(`${API}/upload`, { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Upload failed');

      docId = data.doc_id;
      document.getElementById('docName').textContent = data.filename;
      document.getElementById('docMeta').textContent =
        `${data.num_chunks} chunks · ${(data.char_count/1000).toFixed(1)}k chars`;
      document.getElementById('docCard').style.display = 'block';

      statusEl.innerHTML = '<div class="alert success">✓ Document indexed successfully.</div>';
      document.getElementById('questionInput').disabled = false;
      document.getElementById('askBtn').disabled = false;
      document.getElementById('extractBtn').disabled = false;

      // Clear previous messages
      document.getElementById('messages').innerHTML = '';
    } catch(e) {
      statusEl.innerHTML = `<div class="alert error">✗ ${e.message}</div>`;
    }
  }

  // ── Ask ────────────────────────────────────────────────────────────────────
  document.getElementById('askBtn').addEventListener('click', sendQuestion);
  document.getElementById('questionInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendQuestion();
  });

  async function sendQuestion() {
    const input = document.getElementById('questionInput');
    const q = input.value.trim();
    if (!q || !docId) return;
    input.value = '';

    appendMsg('user', q);
    const loadingId = appendMsg('bot', '<span class="spinner"></span>');

    try {
      const res  = await fetch(`${API}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ doc_id: docId, question: q }),
      });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch(e) { throw new Error(text.substring(0, 200)); }
      if (!res.ok) throw new Error(data.detail || text);
      replaceMsg(loadingId, buildAnswerHTML(data));
    } catch(e) {
      replaceMsg(loadingId, `<div class="alert error">✗ ${e.message}</div>`);
    }
  }

  function buildAnswerHTML(data) {
    const conf  = data.confidence;
    const cls   = conf >= 0.65 ? 'conf-high' : conf >= 0.40 ? 'conf-mid' : 'conf-low';
    const emoji = conf >= 0.65 ? '✅' : conf >= 0.40 ? '⚠️' : '❌';

    let html = `<div>${data.answer}</div>`;
    html += `<div class="conf-badge ${cls}">${emoji} Confidence: ${(conf*100).toFixed(1)}%</div>`;

    if (data.guardrail) {
      html += `<div style="font-size:11px;color:var(--muted);margin-top:4px">
                 Guardrail: ${data.guardrail}</div>`;
    }

    if (data.sources && data.sources.length) {
      const id = 'src-' + Date.now();
      html += `<div class="sources-toggle" onclick="toggleSources('${id}')">
                 📎 View ${data.sources.length} source chunk(s)</div>
               <div class="sources-box" id="${id}">
                 ${data.sources.map((s,i) =>
                   `<div class="source-chunk"><strong>Chunk ${i+1}:</strong><br/>${escHtml(s.substring(0,300))}…</div>`
                 ).join('')}
               </div>`;
    }
    return html;
  }

  function toggleSources(id) {
    document.getElementById(id).classList.toggle('open');
  }

  let msgCounter = 0;
  function appendMsg(role, html) {
    const id   = 'msg-' + (++msgCounter);
    const box  = document.getElementById('messages');
    const av   = role === 'user' ? '🧑' : '🤖';
    box.innerHTML += `
      <div class="msg ${role}" id="${id}">
        <div class="avatar">${av}</div>
        <div class="bubble">${html}</div>
      </div>`;
    box.scrollTop = box.scrollHeight;
    return id;
  }

  function replaceMsg(id, html) {
    const el = document.getElementById(id);
    if (el) el.querySelector('.bubble').innerHTML = html;
  }

  // ── Extract ────────────────────────────────────────────────────────────────
  document.getElementById('extractBtn').addEventListener('click', async () => {
    if (!docId) return;
    const out = document.getElementById('extractOutput');
    out.innerHTML = '<div class="spinner"></div> Extracting fields…';
    try {
      const res  = await fetch(`${API}/extract`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ doc_id: docId }),
      });
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } 
      catch(e) { throw new Error(text.substring(0, 200)); }
      if (!res.ok) throw new Error(data.detail || text);
      out.innerHTML = `<div class="json-output">${syntaxHighlight(data.extraction)}</div>`;
    } catch(e) {
      out.innerHTML = `<div class="alert error">✗ ${e.message}</div>`;
    }
  });

  function syntaxHighlight(obj) {
    const json = JSON.stringify(obj, null, 2);
    return json.replace(
      /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
      match => {
        if (/^"/.test(match)) {
          if (/:$/.test(match)) return `<span class="json-key">${escHtml(match)}</span>`;
          if (match === '"null"' || match === 'null') return `<span class="json-null">${match}</span>`;
          return `<span class="json-str">${escHtml(match)}</span>`;
        }
        if (/null/.test(match)) return `<span class="json-null">${match}</span>`;
        return `<span class="json-num">${match}</span>`;
      }
    );
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
